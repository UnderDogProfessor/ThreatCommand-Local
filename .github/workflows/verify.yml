name: Verify local build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Ephemeral CI database only; local runs continue to require an untracked .env password.
    env:
      POSTGRES_PASSWORD: threatcommand-ci-ephemeral-only
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build local containers
        run: docker compose build
      - name: Run backend unit tests
        run: docker compose run --rm --no-deps -v "$PWD/backend/tests:/app/tests:ro" api python -m unittest discover -s /app/tests -v
      - name: Audit pinned application dependencies
        run: |
          docker run --rm -v "$PWD/frontend:/workspace" -w /workspace node:24-alpine@sha256:a0b9bf06e4e6193cf7a0f58816cc935ff8c2a908f81e6f1a95432d679c54fbfd sh -c 'set -e; trap "rm -rf node_modules" EXIT; npm ci --ignore-scripts --no-audit --no-fund; npm audit --omit=dev --audit-level=high'
          docker compose run --rm --no-deps api python -m pip check
      - name: Start local stack
        run: docker compose up -d
      - name: Check localhost health endpoints
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/api/health && curl --fail --silent --show-error http://127.0.0.1:3000/; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color
          exit 1
      - name: Stop local stack
        if: always()
        run: docker compose down -v --remove-orphans
